<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 春天 -->
  <circle cx="20" cy="20" r="8" fill="#FF9AA2"/>
  <text x="20" y="24" text-anchor="middle" font-size="10">🌸</text>
  <!-- 夏天 -->
  <circle cx="44" cy="20" r="8" fill="#FFD93D"/>
  <text x="44" y="24" text-anchor="middle" font-size="10">☀️</text>
  <!-- 秋天 -->
  <circle cx="20" cy="44" r="8" fill="#FF8C42"/>
  <text x="20" y="48" text-anchor="middle" font-size="10">🍂</text>
  <!-- 冬天 -->
  <circle cx="44" cy="44" r="8" fill="#A8DADC"/>
  <text x="44" y="48" text-anchor="middle" font-size="10">❄️</text>
  <!-- 中心 -->
  <circle cx="32" cy="32" r="6" fill="#4A90"/>
  <text x="32" y="36" text-anchor="middle" font-size="8" fill="white">🏔️</text>
</svg>